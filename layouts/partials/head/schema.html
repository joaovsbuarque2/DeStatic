<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Params.schema.organization.name }}",
  "url": "{{ .Site.Params.schema.organization.url }}",
  "logo": "{{ .Site.Params.schema.organization.logo | absURL }}",
  "description": "{{ .Site.Params.brand.description }}",
  {{ with .Site.Params.schema.organization.sameAs }}
  "sameAs": {{ . | jsonify | safeJS }},
  {{ end }}
  {{ if .Site.Params.schema.person.enabled }}
  "founder": {
    "@type": "Person",
    "name": "{{ .Site.Params.brand.name }}"
  }
  {{ end }}
}
</script>

{{ if eq .Type "blog" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Person",
    "name": "{{ with .Params.author }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}"
  }
}
</script>
{{ end }}

{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.brand.description }}"
}
</script>
{{ end }}

{{ with .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $index, $item := . }}
    {{ if $index }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $item.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $item.answer }}"
      }
    }
    {{ end }}
  ]
}
</script>
{{ end }}
