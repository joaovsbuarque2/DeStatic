# DeStatic Design System — Shadow Tokens
light:
  sm: "0 1px 2px 0 rgb(0 0 0 / 0.05)"
  md: "0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05)"
  lg: "0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05)"
  xl: "0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05)"
  2xl: "0 25px 50px -12px rgb(0 0 0 / 0.1)"
  glow: "0 0 20px rgb(139 92 246 / 0.15)"
  glow-lg: "0 0 40px rgb(139 92 246 / 0.2)"
  inner: "inset 0 2px 4px 0 rgb(0 0 0 / 0.05)"

dark:
  sm: "0 1px 2px 0 rgb(0 0 0 / 0.3)"
  md: "0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.2)"
  lg: "0 10px 15px -3px rgb(0 0 0 / 0.3), 0 4px 6px -4px rgb(0 0 0 / 0.2)"
  xl: "0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.2)"
  2xl: "0 25px 50px -12px rgb(0 0 0 / 0.4)"
  glow: "0 0 20px rgb(139 92 246 / 0.25)"
  glow-lg: "0 0 40px rgb(139 92 246 / 0.35)"
  inner: "inset 0 2px 4px 0 rgb(0 0 0 / 0.3)"
