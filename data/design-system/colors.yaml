# StaticPrime Design System — Color Tokens
# ──────────────────────────────────────────
# Uses CSS custom properties via Hugo data

light:
  # Backgrounds
  bg-primary: "#ffffff"
  bg-secondary: "#f5f5f4"
  bg-tertiary: "#e7e5e4"
  bg-card: "#fafaf9"
  bg-elevated: "#ffffff"
  bg-inverse: "#0c0a09"

  # Text
  text-primary: "#0c0a09"
  text-secondary: "#57534e"
  text-tertiary: "#a8a29e"
  text-inverse: "#fafaf9"
  text-link: "#292524"

  # Borders
  border-primary: "#d6d3d1"
  border-secondary: "#e7e5e4"
  border-tertiary: "#f5f5f4"

  # Accent — Cosmic Violet
  accent-50: "#f5f3ff"
  accent-100: "#ede9fe"
  accent-200: "#ddd6fe"
  accent-300: "#c4b5fd"
  accent-400: "#a78bfa"
  accent-500: "#8b5cf6"
  accent-600: "#7c3aed"
  accent-700: "#6d28d9"
  accent-800: "#5b21b6"
  accent-900: "#4c1d95"

  # Accent — Cyan (secondary)
  cyan-50: "#ecfeff"
  cyan-100: "#cffafe"
  cyan-200: "#a5f3fc"
  cyan-300: "#67e8f9"
  cyan-400: "#22d3ee"
  cyan-500: "#06b6d4"
  cyan-600: "#0891b2"
  cyan-700: "#0e7490"

  # Status
  success: "#16a34a"
  warning: "#d97706"
  error: "#dc2626"
  info: "#2563eb"

dark:
  # Backgrounds
  bg-primary: "#0c0a09"
  bg-secondary: "#1c1917"
  bg-tertiary: "#292524"
  bg-card: "#1c1917"
  bg-elevated: "#292524"
  bg-inverse: "#fafaf9"

  # Text
  text-primary: "#fafaf9"
  text-secondary: "#a8a29e"
  text-tertiary: "#57534e"
  text-inverse: "#0c0a09"
  text-link: "#d6d3d1"

  # Borders
  border-primary: "#292524"
  border-secondary: "#1c1917"
  border-tertiary: "#1c1917"

  # Accent — Cosmic Violet (brighter in dark)
  accent-50: "#2e1065"
  accent-100: "#4c1d95"
  accent-200: "#5b21b6"
  accent-300: "#6d28d9"
  accent-400: "#7c3aed"
  accent-500: "#8b5cf6"
  accent-600: "#a78bfa"
  accent-700: "#c4b5fd"
  accent-800: "#ddd6fe"
  accent-900: "#ede9fe"

  # Accent — Cyan
  cyan-50: "#164e63"
  cyan-100: "#155e75"
  cyan-200: "#0e7490"
  cyan-300: "#0891b2"
  cyan-400: "#06b6d4"
  cyan-500: "#22d3ee"
  cyan-600: "#67e8f9"
  cyan-700: "#a5f3fc"

  # Status
  success: "#22c55e"
  warning: "#f59e0b"
  error: "#ef4444"
  info: "#3b82f6"
