# StaticPrime Design System — Typography Tokens
# ───────────────────────────────────────────────
# Font families
fonts:
  display:
    name: "Syne"
    stack: "'Syne', system-ui, sans-serif"
    weights: [400, 500, 600, 700, 800]
    variable: true
  body:
    name: "Sora"
    stack: "'Sora', system-ui, sans-serif"
    weights: [300, 400, 500, 600, 700]
    variable: true
  mono:
    name: "JetBrains Mono"
    stack: "'JetBrains Mono', monospace"
    weights: [400, 500, 700]
    variable: true

# Type scale (mobile-first)
scale:
  display-xl:
    font-size: "clamp(3rem, 8vw, 6rem)"
    line-height: "1.05"
    letter-spacing: "-0.04em"
    font-weight: 800
  display-l:
    font-size: "clamp(2.5rem, 6vw, 4.5rem)"
    line-height: "1.08"
    letter-spacing: "-0.03em"
    font-weight: 800
  display-m:
    font-size: "clamp(2rem, 5vw, 3.5rem)"
    line-height: "1.1"
    letter-spacing: "-0.025em"
    font-weight: 700
  h1:
    font-size: "clamp(1.75rem, 4vw, 3rem)"
    line-height: "1.15"
    letter-spacing: "-0.02em"
    font-weight: 700
  h2:
    font-size: "clamp(1.5rem, 3vw, 2.25rem)"
    line-height: "1.2"
    letter-spacing: "-0.015em"
    font-weight: 700
  h3:
    font-size: "clamp(1.25rem, 2.5vw, 1.75rem)"
    line-height: "1.25"
    letter-spacing: "-0.01em"
    font-weight: 600
  h4:
    font-size: "clamp(1.125rem, 2vw, 1.5rem)"
    line-height: "1.3"
    letter-spacing: "-0.005em"
    font-weight: 600
  body-xl:
    font-size: "clamp(1.125rem, 1.5vw, 1.25rem)"
    line-height: "1.6"
    font-weight: 400
  body-l:
    font-size: "clamp(1rem, 1.25vw, 1.125rem)"
    line-height: "1.65"
    font-weight: 400
  body:
    font-size: "clamp(0.9375rem, 1vw, 1rem)"
    line-height: "1.7"
    font-weight: 400
  body-small:
    font-size: "clamp(0.875rem, 0.875vw, 0.9375rem)"
    line-height: "1.7"
    font-weight: 400
  caption:
    font-size: "clamp(0.75rem, 0.75vw, 0.8125rem)"
    line-height: "1.5"
    letter-spacing: "0.02em"
    font-weight: 500
  overline:
    font-size: "clamp(0.6875rem, 0.7vw, 0.75rem)"
    line-height: "1.2"
    letter-spacing: "0.08em"
    font-weight: 600
    text-transform: "uppercase"
