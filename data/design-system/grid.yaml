# StaticPrime Design System — Grid & Breakpoints
breakpoints:
  sm: "640px"
  md: "768px"
  lg: "1024px"
  xl: "1280px"
  2xl: "1536px"

grid:
  columns: 12
  gap:
    mobile: "1rem"
    tablet: "1.5rem"
    desktop: "2rem"
  margin:
    mobile: "1.5rem"
    tablet: "2rem"
    desktop: "auto"
  maxWidth: "1280px"
